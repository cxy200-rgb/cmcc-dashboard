<html lang="zh-CN">

<meta charset="UTF-8">

<title>重点工作指标看板 - 布局B</title>
<style>
  :root {
    --bg: #010b1b;
    --card-bg: rgba(3, 18, 47, 0.88);
    --border: rgba(0, 200, 255, 0.35);
    --border-bright: rgba(0, 220, 255, 0.7);
    --accent: #00c8ff;
    --accent2: #0aefff;
    --text: #e0f0ff;
    --text-dim: #7eb8da;
    --success: #00e676;
    --warning: #ffc107;
    --danger: #ff5252;
    --bar-track: rgba(0,200,255,0.1);
    --glow: 0 0 8px rgba(0,200,255,0.25);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100vw; height:100vh; min-width:1920px; min-height:1080px; font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",sans-serif; background:var(--bg); color:var(--text); }
  body {
    background:
      radial-gradient(ellipse at 18% 35%, rgba(0,180,255,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 82% 25%, rgba(0,200,220,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 45% 80%, rgba(0,160,220,0.04) 0%, transparent 55%),
      linear-gradient(rgba(0,180,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.02) 1px, transparent 1px),
      var(--bg);
    background-size: 100% 100%, 100% 100%, 100% 100%, 40px 40px, 40px 40px;
  }
  .dashboard { position:relative; z-index:1; width:100vw; min-width:1920px; height:100vh; min-height:1080px; padding:10px 16px; }

  /* ===== 布局：上排量+客(各50%) / 下排收+质+能(各33%) ===== */
  .modules-grid {
    width:100%; height:100%; display:grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: 1fr 1fr;
    grid-template-areas:
      "liang liang liang ke    ke    ke"
      "shou  shou  zhi   zhi   neng  neng";
    gap:8px;
  }
  .area-liang { grid-area:liang; } .area-ke { grid-area:ke; }
  .area-shou  { grid-area:shou; }  .area-zhi { grid-area:zhi; } .area-neng { grid-area:neng; }

  /* ===== 模块卡片 ===== */
  .module-card {
    background:linear-gradient(180deg, rgba(2,20,50,0.92) 0%, rgba(2,12,35,0.94) 100%);
    border:2px solid rgba(0,200,255,0.35);
    display:flex; flex-direction:column; overflow:hidden;
    position:relative; box-shadow:var(--glow);
  }
  .module-card::before, .module-card::after {
    content:''; position:absolute; width:12px; height:12px; z-index:5; pointer-events:none;
    border-color:var(--border-bright); border-style:solid;
  }
  .module-card::before { top:0; left:0; border-width:2px 0 0 2px; }
  .module-card::after  { bottom:0; right:0; border-width:0 2px 2px 0; }

  /* ===== 模块顶部标题 ===== */
  .module-header {
    flex-shrink:0; padding:7px 14px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg, rgba(0,160,240,0.12) 0%, rgba(0,60,120,0.03) 100%);
    border-bottom:1px solid rgba(0,200,255,0.35);
    position:relative;
  }
  .module-header::after {
    content:''; position:absolute; bottom:-1px; left:10px; right:10px;
    height:1px; background:linear-gradient(90deg, transparent, rgba(0,200,255,0.4), transparent);
  }
  .module-header .cat-tag {
    font-size:13px; font-weight:700; padding:3px 10px;
    color:#fff; flex-shrink:0; letter-spacing:2px;
    background:linear-gradient(135deg, var(--accent), #0078a8);
  }
  .cat-tag { background:linear-gradient(135deg, #00a8f0, #0068a0); }
  .module-header .module-name { font-size:14px; font-weight:700; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .overall-dot { width:7px; height:7px; border-radius:50%; box-shadow:0 0 4px currentColor; }

  .module-header { background:linear-gradient(180deg, rgba(0,168,240,0.18), rgba(0,100,160,0.04)); }

  .module-header .cat-tag {
    font-size:13px; font-weight:700; padding:3px 10px;
    color:#fff; flex-shrink:0; letter-spacing:2px;
    background:linear-gradient(135deg, var(--accent), #0078a8);
  }
  .cat-tag { background:linear-gradient(135deg, #00a8f0, #0068a0); }
  .module-header .module-name { font-size:14px; font-weight:700; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .overall-dot { width:7px; height:7px; border-radius:50%; box-shadow:0 0 4px currentColor; }

  .tab-bar {
    flex-shrink:0; display:flex; gap:0;
    padding:0 6px; background:rgba(0,20,50,0.6);
    border-bottom:1px solid rgba(0,200,255,0.25);
  }
  .tab-btn {
    padding:6px 16px; font-size:12px; font-weight:600;
    color:#5a9ab8; background:none; border:none;
    border-bottom:2px solid transparent;
    cursor:pointer; transition:all .25s;
    white-space:nowrap; font-family:inherit;
    display:flex; align-items:center; gap:5px;
  }
  .tab-btn:hover { color:#b0e0ff; }
  .tab-btn.active { color:#fff; border-bottom-color:var(--accent); text-shadow:0 0 6px rgba(0,200,255,0.4); }

  .module-body { flex:1; overflow-y:auto; overflow-x:hidden; }
  .module-body::-webkit-scrollbar { width:3px; }
  .module-body::-webkit-scrollbar-thumb { background:rgba(0,180,240,0.2); border-radius:2px; }

  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  .indicator-table { width:100%; border-collapse:collapse; font-size:11px; table-layout:fixed; }
  .indicator-table th {
    position:sticky; top:0;
    background:rgba(2,14,38,0.97);
    padding:5px 5px; text-align:center; font-weight:600; font-size:10px;
    color:var(--accent); border-bottom:2px solid rgba(0,200,255,0.5);
    white-space:nowrap; z-index:2; letter-spacing:1px;
  }
  .indicator-table td { padding:6px 6px; border:1px solid rgba(0,200,255,0.18); vertical-align:middle; line-height:1.5; }
  .indicator-table tbody tr:hover td { background:rgba(0,180,255,0.04); }

  .col-l2 { width:12%; } .col-act { width:34%; } .col-path { width:20%; } .col-target { width:14%; } .col-status { width:20%; }

  .l2-name { font-weight:600; color:#c8e8ff; font-size:11px; word-break:break-all; overflow:hidden; }
  .act-text { color:#b8ddf0; font-size:10px; line-height:1.5; overflow:hidden; }
  .path-text { color:#b8ddf0; font-size:10px; line-height:1.5; overflow:hidden; }
  .target-num { font-weight:700; font-size:11px; color:#d0ecff; text-align:center; white-space:nowrap; }
  .status-cell { text-align:center; }

  .progress-wrap { display:flex; align-items:center; gap:5px; }
  .progress-bar-outer { flex:1; height:4px; background:var(--bar-track); border-radius:2px; overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,0.3); }
  .progress-bar-inner { height:100%; border-radius:2px; transition:width .5s ease; }
  .progress-text { font-weight:700; font-size:11px; min-width:32px; text-align:right; flex-shrink:0; }

  .pg-green  .progress-bar-inner { background:linear-gradient(90deg, #00c853, #00e676); box-shadow:0 0 6px rgba(0,230,118,0.3); }
  .pg-green  .progress-text { color:#00e676; }
  .pg-yellow .progress-bar-inner { background:linear-gradient(90deg, #e6a000, #ffc107); box-shadow:0 0 6px rgba(255,193,7,0.3); }
  .pg-yellow .progress-text { color:#ffc107; }
  .pg-red    .progress-bar-inner { background:linear-gradient(90deg, #d50000, #ff5252); box-shadow:0 0 6px rgba(255,82,82,0.3); }
  .pg-red    .progress-text { color:#ff5252; }
  .pg-na     .progress-bar-inner { background:#405060; } .pg-na .progress-text { color:#506880; }

  .dot-green { background:var(--success); box-shadow:0 0 4px var(--success); }
  .dot-yellow{ background:var(--warning); box-shadow:0 0 4px var(--warning); }
  .dot-red   { background:var(--danger); box-shadow:0 0 4px var(--danger); }
  .dot-gray  { background:#506880; }

  td[rowspan]{border-right:1px solid rgba(0,200,255,0.25);}
  .row-l2-first td { border-top:1px solid rgba(0,180,240,0.12); }

  /* ===== 量模块 — Bullet Progress Bar ===== */
  .progress-cards { flex:1; overflow-y:auto; padding:10px 16px; display:flex; flex-direction:column; gap:14px; }
  .l2-title { font-size:13px; font-weight:700; color:var(--accent); letter-spacing:1px; }
  .progress-cards::-webkit-scrollbar { width:3px; }
  .progress-cards::-webkit-scrollbar-thumb { background:rgba(0,180,240,0.2); border-radius:2px; }
  .bullet-item { display:flex; gap:12px; align-items:flex-start; }
  .bullet-label { font-size:12px; color:#c8e0f0; font-weight:600; width:200px; flex-shrink:0; padding-top:2px; line-height:1.4; }
  .bullet-right { flex:1; min-width:0; }
  /* 轨道 + 圆点 */
  .bullet-track-wrap { position:relative; height:18px; display:flex; align-items:center; margin-bottom:4px; }
  .bullet-track {
    width:100%; height:4px; background:rgba(0,180,255,0.12);
    border-radius:2px;
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.4);
    position:relative; overflow:hidden;
  }
  .bullet-track-fill {
    position:absolute; left:0; top:0; height:100%;
    background:linear-gradient(90deg, #e87800, #ff8c00);
    border-radius:2px 0 0 2px;
    box-shadow:0 0 6px rgba(255,140,0,0.4);
    transition:width .6s ease;
  }
  .bullet-dot {
    position:absolute; top:50%; transform:translate(-50%, -50%);
    width:14px; height:14px;
    background:radial-gradient(circle at 40% 35%, #ffb940, #e87800);
    border:2px solid #fff;
    border-radius:50%;
    box-shadow:0 0 10px #ff8c00, 0 0 22px rgba(255,140,0,0.45), 0 0 2px rgba(0,0,0,0.3);
    z-index:2;
    transition:left .6s ease;
  }
  /* 数值行 */
  .bullet-values { display:flex; align-items:center; justify-content:space-between; font-size:12px; padding:0 2px; font-weight:600; }
  .bullet-values .bv-target { color:#e8f4ff; }
  .bullet-values .bv-target span { color:#88c8e8; font-weight:400; }
  .bullet-values .bv-actual { color:#e8f4ff; text-align:right; }
  .bullet-values .bv-actual span { color:#88c8e8; font-weight:400; }

  .act-note { flex-shrink:0; padding:10px 14px; border-top:1px solid rgba(0,180,240,0.2); }
  .act-note .act-label { font-size:10px; color:var(--accent); letter-spacing:1px; margin-bottom:4px; font-weight:600; }
  .act-note .act-content { font-size:10px; color:#b8ddf0; line-height:1.5; }
</style>
</head>

<script>
function parseNum(str) {
  if (!str || str==='无'|| str==='—') return NaN;
  const m=String(str).replace(/[,，]/g,'').trim().match(/(-?[\d.]+)\s*[%倍]?/);
  return m?parseFloat(m[1]):NaN;
}
function calcProgress(target,actual){
  const t=parseNum(target), a=parseNum(actual);
  if(isNaN(t)||isNaN(a)||t===0) return NaN;
  return Math.round(a/t*1000)/10;
}
function clampBar(p){ return isNaN(p)?0:Math.min(100,Math.max(0,p)); }
function pgColor(p){ if(isNaN(p))return'pg-na'; if(p>=80)return'pg-green'; if(p>=50)return'pg-yellow'; return'pg-red'; }
function dotColor(p){ if(isNaN(p))return'dot-gray'; if(p>=80)return'dot-green'; if(p>=50)return'dot-yellow'; return'dot-red'; }
function subProgress(sub) {
  const progs = [];
  sub.l2groups.forEach(g => g.rows.forEach(r => {
    const p = calcProgress(r.target, r.actual);
    if (!isNaN(p)) progs.push(Math.min(100, p));
  }));
  return progs.length ? Math.round(progs.reduce((a,b)=>a+b,0) / progs.length) : NaN;
}

function renderTableBody(l2groups, actSpans) {
  let rowIdx = 0;
  return l2groups.map(g => g.rows.map((r, i) => {
    const prog = calcProgress(r.target, r.actual);
    const showBar = !isNaN(prog);
    const barW = clampBar(prog);
    const isFirst = (i===0), rs = g.rows.length;
    // 跨组act合并
    let actRs = rs, showAct = isFirst;
    if(actSpans && isFirst){
      const span = actSpans.find(s => s.start === rowIdx);
      if(span){ actRs = span.len; }
      const firstInSpan = actSpans.find(s => rowIdx >= s.start && rowIdx < s.start + s.len);
      if(firstInSpan && firstInSpan.start !== rowIdx) showAct = false;
    }
    let tr = `<tr class="${isFirst?'row-l2-first':''}">`;
    if(isFirst) tr += `<td rowspan="${rs}"><div class="l2-name">${g.name}</div></td>`;
    if(showAct) tr += `<td rowspan="${actRs}"><div class="act-text">${g.act ? g.act.replace(/\n/g,'<br>') : '—'}</div></td>`;
    tr += `<td><div class="path-text">${r.path}</div></td>`;
    tr += `<td><div class="target-num">${r.target}</div></td>`;
    tr += `<td class="status-cell ${pgColor(prog)}">`;
    if(r.actual==='—'){ tr+='<span style="color:#506880">—</span>'; }
    else { tr+=`<div class="progress-wrap">${showBar?`<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${barW}%"></div></div>`:''}<span class="progress-text">${r.actual}</span></div>`; }
    tr += '</td></tr>';
    rowIdx++;
    return tr;
  }).join('')).join('');
}

function renderAll(data) {
  const grid = document.getElementById('modulesGrid');
  let uid = 0;
  grid.innerHTML = data.map(mod => {
    const allProgs = [];
    mod.subs.forEach(sub => sub.l2groups.forEach(g => g.rows.forEach(r => {
      const p = calcProgress(r.target, r.actual);
      if(!isNaN(p)) allProgs.push(Math.min(100,p));
    })));
    const overall = allProgs.length ? Math.round(allProgs.reduce((a,b)=>a+b,0)/allProgs.length) : NaN;
    const hasTabs = mod.subs.length >= 1;
    const mId = 'm'+(uid++);
    const catLabel = mod.id==='liang'?'量':mod.id==='ke'?'客':mod.id==='shou'?'收':mod.id==='zhi'?'质':'能';

    let html = `<div class="module-card ${mod.area}">`;
    // 顶部标题条
    html += `<div class="module-header ${mod.cat}">
      <span class="cat-tag ${mod.cat}">${catLabel}</span>
    </div>`;

    if(hasTabs){
      html += `<div class="tab-bar" id="${mId}-tabs">`;
      mod.subs.forEach((sub,si) => {
        const sp = subProgress(sub);
        html += `<button class="tab-btn${si===0?' active':''}" data-m="${mId}" data-idx="${si}">${sub.name}</button>`;
      });
      html += `</div>`;
    }

    html += `<div class="module-body" id="${mId}-body">`;

    mod.subs.forEach((sub,si) => {
      // 计算跨l2group的act合并
      let actSpans=[], cs=0, ri=0;
      sub.l2groups.forEach((g,gi)=>{
        const act=g.act||'';
        const prevAct=gi>0?(sub.l2groups[gi-1].act||''):'';
        if(gi>0&&act!==prevAct){ actSpans.push({start:cs,len:ri-cs}); cs=ri; }
        ri+=g.rows.length;
      });
      actSpans.push({start:cs,len:ri-cs});
      html += `<div class="tab-panel${si===0?' active':''}" data-m="${mId}" data-idx="${si}"><table class="indicator-table"><thead><tr><th class="col-l2">二级指标</th><th class="col-act">举措</th><th class="col-path">路径关键点</th><th class="col-target">月目标</th><th class="col-status">完成情况</th></tr></thead><tbody>${renderTableBody(sub.l2groups, actSpans)}</tbody></table></div>`;
    });
    html += `</div></div>`;
    return html;
  }).join('');

  grid.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      const mId=this.dataset.m, idx=this.dataset.idx;
      document.querySelectorAll(`.tab-btn[data-m="${mId}"]`).forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      document.querySelectorAll(`.tab-panel[data-m="${mId}"]`).forEach(p=>p.classList.remove('active'));
      const panel=document.querySelector(`.tab-panel[data-m="${mId}"][data-idx="${idx}"]`);
      if(panel) panel.classList.add('active');
    });
  });
}

renderAll(data);
